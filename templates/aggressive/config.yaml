# 进攻型策略配置 — 高换手、追强势股
overnight:
  score_weights:
    momentum: 0.25      # 涨幅分析权重
    turnover: 0.15      # 换手分析
    market: 0.05        # 市场判断
    target: 0.05        # 目标设定
    capital: 0.20       # 资金动向
    technical: 0.20     # 技术形态
    quantitative: 0.10  # 量化因子
  entry:
    price_range: [5, 80]
    turnover_range: [5, 25]
    change_range: [2, 10]
  exit:
    profit_target: 0.06
    stop_loss: -0.03
